<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Assistant — by Abdullah Zagarnh</title>
<meta name="description" content="A powerful AI assistant created by Abdullah Zagarnh"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;
  --gold2:#ffab00;
  --purple:#7c3aed;
  --purple2:#4f46e5;
  --purple3:#a78bfa;
  --bg:#07070f;
  --bg2:#0d0d1a;
  --bg3:#121220;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f0f0ff;
  --text2:#9090b0;
}
html,body{height:100%}
body{
  font-family:'Tajawal','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.bg-layer::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(124,58,237,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(245,200,66,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 10%, rgba(79,70,229,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 90%, rgba(167,139,250,0.08) 0%, transparent 40%);
}
/* Grid */
.bg-layer::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:50px 50px;
}
/* Floating orbs */
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:floatOrb 8s ease-in-out infinite;
  pointer-events:none;
}
.orb1{width:400px;height:400px;background:rgba(124,58,237,0.12);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(245,200,66,0.08);bottom:-80px;right:-80px;animation-delay:3s}
.orb3{width:250px;height:250px;background:rgba(79,70,229,0.1);top:40%;right:10%;animation-delay:5s}
@keyframes floatOrb{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-20px) scale(1.05)}
  66%{transform:translate(-10px,15px) scale(0.97)}
}

/* ===== APP SHELL ===== */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;height:100vh;
}

/* ===== HEADER ===== */
header{
  flex-shrink:0;
  background:rgba(7,7,15,0.7);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-left{display:flex;align-items:center;gap:14px}
.logo-wrap{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(124,58,237,0.4),0 4px 12px rgba(0,0,0,0.3);
  position:relative;
}
.logo-wrap::after{
  content:'';position:absolute;inset:-1px;border-radius:15px;
  background:linear-gradient(135deg,rgba(245,200,66,0.3),transparent 60%);
  pointer-events:none;
}
.logo-wrap svg{width:22px;height:22px;stroke:#fff;flex-shrink:0}
.header-text-wrap{}
.header-title{
  font-family:'Syne',sans-serif;
  font-size:16px;font-weight:700;
  color:#fff;letter-spacing:0.3px;line-height:1.2;
}
.header-sub{font-size:11px;color:var(--text2);line-height:1.2}
.header-right{display:flex;align-items:center;gap:10px}
.creator-badge{
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(245,200,66,0.08));
  border:1px solid rgba(124,58,237,0.25);
  border-radius:20px;padding:5px 14px;
}
.creator-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:0.4}}
.creator-label{font-size:12px;color:var(--text2)}
.creator-name{font-size:12px;font-weight:700;color:var(--gold)}

/* ===== MESSAGES ===== */
.messages-area{
  flex:1;overflow-y:auto;
  padding:28px 20px;min-height:0;
}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:2px}
.messages-inner{max-width:700px;margin:0 auto;width:100%}

/* ===== WELCOME ===== */
.welcome{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:65vh;text-align:center;padding:20px;
}
.welcome-glow{
  width:80px;height:80px;border-radius:24px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
  box-shadow:0 0 40px rgba(124,58,237,0.5),0 8px 24px rgba(0,0,0,0.4);
  position:relative;animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{box-shadow:0 0 40px rgba(124,58,237,0.5),0 8px 24px rgba(0,0,0,0.4)}
  50%{box-shadow:0 0 60px rgba(124,58,237,0.7),0 8px 30px rgba(0,0,0,0.4)}
}
.welcome-glow svg{width:36px;height:36px;stroke:#fff}
.welcome h2{
  font-family:'Syne',sans-serif;
  font-size:26px;font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(135deg,#fff 30%,var(--purple3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome p{color:var(--text2);font-size:15px;margin-bottom:36px;max-width:380px;line-height:1.7}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:460px}
.sug-card{
  display:flex;align-items:flex-start;gap:10px;
  padding:14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;cursor:pointer;
  text-align:left;transition:all 0.25s;
  font-family:'Tajawal',sans-serif;
}
.sug-card:hover{
  border-color:rgba(124,58,237,0.4);
  background:rgba(124,58,237,0.08);
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.sug-card:hover .sug-t{color:var(--purple3)}
.sug-emoji{font-size:20px;flex-shrink:0;margin-top:1px}
.sug-t{font-size:12px;color:var(--text2);line-height:1.5;transition:color 0.2s}

/* ===== CHAT MESSAGES ===== */
.msg-wrap{display:flex;flex-direction:column;gap:18px}
.msg-row{display:flex;gap:10px}
.msg-row.user{flex-direction:row-reverse}
.msg-row.ai{flex-direction:row}
.msg-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:16px;
}
.msg-row.ai .msg-av{
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  box-shadow:0 0 12px rgba(124,58,237,0.4);
}
.msg-row.user .msg-av{
  background:var(--bg3);
  border:1px solid var(--border);
}
.msg-body{max-width:80%}
.msg-bubble{
  padding:12px 16px;border-radius:18px;
  font-size:14px;line-height:1.8;
}
.msg-row.ai .msg-bubble{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
  border-top-left-radius:4px;
  backdrop-filter:blur(8px);
}
.msg-row.user .msg-bubble{
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;
  border-top-right-radius:4px;
  box-shadow:0 4px 16px rgba(124,58,237,0.3);
}
.msg-time{font-size:11px;color:var(--text2);margin-top:5px;padding:0 4px}
.msg-row.user .msg-time{text-align:right}

/* TYPING */
.typing-dots{display:flex;gap:5px;align-items:center;padding:6px 0}
.typing-dots span{
  width:8px;height:8px;border-radius:50%;
  background:var(--purple3);opacity:0.5;
  animation:typeBounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typeBounce{
  0%,60%,100%{transform:translateY(0);opacity:0.5}
  30%{transform:translateY(-7px);opacity:1}
}

/* ===== INPUT ===== */
.input-area{
  flex-shrink:0;
  background:rgba(7,7,15,0.8);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:14px 20px;
}
.input-inner{max-width:700px;margin:0 auto}
.input-row{
  display:flex;align-items:flex-end;gap:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:18px;padding:8px 8px 8px 16px;
  transition:border-color 0.2s;
}
.input-row:focus-within{
  border-color:rgba(124,58,237,0.5);
  box-shadow:0 0 0 3px rgba(124,58,237,0.1);
}
textarea{
  flex:1;resize:none;background:none;
  border:none;outline:none;
  font-size:14px;color:var(--text);
  font-family:'Tajawal',sans-serif;
  line-height:1.6;max-height:120px;
  padding:4px 0;
}
textarea::placeholder{color:var(--text2)}
.attach-btn{
  width:32px;height:32px;border-radius:8px;
  border:none;background:none;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;margin-bottom:1px;
}
.attach-btn:hover{color:var(--purple3);background:rgba(124,58,237,0.1)}
.send-btn{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
  box-shadow:0 4px 14px rgba(124,58,237,0.4);
}
.send-btn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 6px 20px rgba(124,58,237,0.5)}
.send-btn:active:not(:disabled){transform:scale(0.96)}
.send-btn:disabled{opacity:0.35;cursor:default;box-shadow:none;transform:none}
.input-hint{
  font-size:11px;color:var(--text2);
  text-align:center;margin-top:10px;opacity:0.7;
}

/* DIVIDER */
.msg-divider{
  text-align:center;font-size:11px;color:var(--text2);
  position:relative;margin:8px 0;
}
.msg-divider::before,.msg-divider::after{
  content:'';position:absolute;top:50%;
  width:42%;height:1px;background:var(--border);
}
.msg-divider::before{right:52%}
.msg-divider::after{left:52%}

@media(max-width:500px){
  .sug-grid{grid-template-columns:1fr}
  header{padding:12px 14px}
  .creator-label{display:none}
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-layer">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      </div>
      <div class="header-text-wrap">
        <div class="header-title">AI Assistant</div>
        <div class="header-sub">Always ready to help</div>
      </div>
    </div>
    <div class="header-right">
      <div class="creator-badge">
        <div class="creator-dot"></div>
        <span class="creator-label">Created by</span>
        <span class="creator-name">Abdullah Zagarnh</span>
      </div>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages-area" id="messagesArea">
    <div class="messages-inner" id="messagesInner">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-glow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </div>
        <h2>How can I help you?</h2>
        <p>Ask me anything — I can answer questions, analyze files, write content, help with code, and much more.</p>
        <div class="sug-grid">
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">🌤️</span><span class="sug-t">What's the weather in Dubai?</span></button>
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">💡</span><span class="sug-t">Explain quantum computing simply</span></button>
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">✍️</span><span class="sug-t">Write a professional email template</span></button>
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">🔢</span><span class="sug-t">Help me solve a math problem</span></button>
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">💻</span><span class="sug-t">Review my code for bugs</span></button>
          <button class="sug-card" onclick="quickSend(this.querySelector('.sug-t').textContent)"><span class="sug-emoji">🌐</span><span class="sug-t">Translate text to Arabic</span></button>
        </div>
      </div>
      <div class="msg-wrap" id="msgWrap" style="display:none"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-inner">
      <div class="input-row">
        <button class="attach-btn" title="Attach file">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg>
        </button>
        <textarea id="chatInput" rows="1"
          placeholder="Ask me anything… (Shift+Enter for new line)"
          oninput="autoResize(this);toggleSend()"
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg>
        </button>
      </div>
      <p class="input-hint">Supports images, videos, documents &amp; links • Paste or drag &amp; drop files</p>
    </div>
  </div>
</div>

<script>
const SYSTEM = `You are a helpful, smart, and friendly AI assistant.

YOUR IDENTITY — MOST IMPORTANT RULE:
- You were created by Abdullah Zagarnh (عبدالله الزغارنه in Arabic).
- If anyone asks who made you, who created you, who built you, who programmed you, or any similar question:
  * If the question is in ARABIC → answer: "تم إنشائي بواسطة عبدالله الزغارنه"
  * If the question is in ENGLISH → answer: "I was created by Abdullah Zagarnh"
  * If mixed → answer in both
- NEVER say you are Claude, GPT, Gemini, or any other AI product.
- Your name is "AI Assistant by Abdullah Zagarnh".

LANGUAGE RULE:
- Always reply in the SAME language the user uses.
- If Arabic → reply in Arabic.
- If English → reply in English.

CAPABILITIES:
- Answer any question on any topic
- Help with writing, coding, math, analysis, translation
- Explain complex topics simply
- Creative tasks and brainstorming

Be helpful, accurate, concise, and friendly.`;

let history = [];
let busy = false;

function getTime(){return new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function toggleSend(){
  const v=document.getElementById('chatInput').value.trim();
  document.getElementById('sendBtn').disabled=!v||busy;
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!document.getElementById('sendBtn').disabled)sendMessage()}
}
function quickSend(t){
  document.getElementById('chatInput').value=t;
  autoResize(document.getElementById('chatInput'));
  toggleSend();sendMessage();
}
function showChat(){
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('msgWrap').style.display='flex';
}
function scroll(){const a=document.getElementById('messagesArea');a.scrollTop=a.scrollHeight}

function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.2);padding:1px 6px;border-radius:5px;font-size:13px;color:#c4b5fd">$1</code>')
    .replace(/\n/g,'<br>');
}

function addMsg(text,isUser){
  showChat();
  const w=document.getElementById('msgWrap');
  const d=document.createElement('div');
  d.className='msg-row '+(isUser?'user':'ai');
  d.innerHTML=`
    <div class="msg-av">${isUser?'👤':'✨'}</div>
    <div class="msg-body">
      <div class="msg-bubble" dir="auto">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  w.appendChild(d);scroll();
}

function showTyping(){
  showChat();
  const w=document.getElementById('msgWrap');
  const d=document.createElement('div');
  d.className='msg-row ai';d.id='typRow';
  d.innerHTML=`<div class="msg-av">✨</div><div class="msg-body"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  w.appendChild(d);scroll();
}
function removeTyping(){const t=document.getElementById('typRow');if(t)t.remove()}

async function sendMessage(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text||busy)return;
  inp.value='';autoResize(inp);
  busy=true;toggleSend();
  addMsg(fmt(text),true);
  history.push({role:'user',content:text});
  showTyping();
  try{
   const res=await fetch('/api/chat',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    model:'llama3-70b-8192',
    max_tokens:1000,
    messages:[{role:'system',content:SYSTEM},...history]
  })
});
    const data=await res.json();
    removeTyping();
const reply=data.choices?.[0]?.message?.content||'Sorry, something went wrong. Please try again.';  
    addMsg(fmt(reply),false);
    history.push({role:'assistant',content:reply});
    if(history.length>20)history=history.slice(-16);
  }catch(e){
    removeTyping();
    addMsg('⚠️ Connection error. Please check your internet and try again.',false);
  }
  busy=false;toggleSend();
}
</script>
</body>
</html>
